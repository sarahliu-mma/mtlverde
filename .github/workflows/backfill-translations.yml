name: Backfill translations (one-time)

# Manually triggered. Translates description_en for any existing DB rows that
# predate the translation pipeline. Safe to run more than once; can be deleted
# once the database is fully backfilled.
on:
  workflow_dispatch: {}

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Backfill missing English descriptions
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python backfill_translations.py

      - name: Commit updated translation cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/translations_cache.json
          git diff --cached --quiet || git commit -m "Update translation cache from backfill"
          git push
